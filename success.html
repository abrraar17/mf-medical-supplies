<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — MF Medical Supplies</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0a0d12;color:#fff;min-height:100vh;display:grid;place-items:center;text-align:center}
.box{max-width:480px;padding:48px 32px}
.check{font-size:72px;margin-bottom:24px;animation:pop .5s ease}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
h1{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;margin-bottom:12px}
p{color:#8a95a3;font-size:15px;line-height:1.7;margin-bottom:32px}
a{display:inline-block;background:#00c9a7;color:#0a0d12;font-weight:700;text-decoration:none;padding:12px 28px;border-radius:8px;transition:background .2s}
a:hover{background:#00a88c}
</style>
</head>
<body>
<div class="box">
  <div class="check">✅</div>
  <h1>Order Confirmed!</h1>
  <p>Thank you for your order. A confirmation email with your tax invoice has been sent to you. Your items will be dispatched within 24 hours.</p>
  <a href="/">← Continue Shopping</a>
</div>
</body>
</html>
